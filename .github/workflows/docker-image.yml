name: Publish Docker Images

on:
  push:
    branches: [ "main" ] # 仅在推送到 main 分支时触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. 打包推送到前端镜像
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sitebox-frontend:latest

      # 2. 打包推送到后端应用镜像
      - name: Build and push Backend App
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sitebox-backend:latest

      # 3. 打包推送到后端 Nginx 镜像
      - name: Build and push Backend Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./backend-nginx
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sitebox-backend-nginx:latest
