version: "3.9"

networks:
  app-network:
    driver: bridge

# 命名 volume：SQLite 数据库文件持久化，跨平台通用（NAS / 云容器 / VPS 均可直接使用）
# 如需绑定到宿主机指定目录，可将 sitebox_data 替换为绑定挂载：
#   volumes:
#     - /your/host/path:/app/data
volumes:
  sitebox_data:

services:
  frontend-nginx:
    container_name: SiteBox
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend-nginx
    environment:
      - BACKEND_ADDR=backend-nginx:3001
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  backend-nginx:
    container_name: SiteBox-backend-nginx
    build:
      context: ./backend-nginx
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - backend-app
    environment:
      - BACKEND_APP_ADDR=backend-app:3000
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

  backend-app:
    container_name: SiteBox-backend-app
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - sitebox_data:/app/data
    environment:
      PORT: 3000
      DB_PATH: /app/data/sitebox.db
      DEPLOY_MODE: docker
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
