version: "3.9"

networks:
  app-network:
    driver: bridge

services:
  frontend-nginx:
    container_name: SiteBox
    build:
      context: ./frontend # Explicitly set build context to ./frontend
      dockerfile: Dockerfile # Dockerfile path is relative to the context (./frontend)
    ports:
      - "80:80"
    depends_on:
      - backend-nginx
    environment:
      - BACKEND_ADDR=backend-nginx:3001
    networks:
      - app-network
    restart: always
    volumes:
      - /mnt/sdb/docker-data/data/SiteBox/SiteBoxFront:/usr/share/nginx/html:ro

  backend-nginx:
    container_name: Sitebox-backend-nginx-server
    build:
      context: ./backend-nginx # 将构建上下文改为当前目录
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - backend-app
    environment:
      - BACKEND_APP_ADDR=backend-app:3000
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend-app:
    container_name: SiteBox-backend-app-server
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - /mnt/sdb/docker-data/data/SiteBox/SiteBoxData:/app/data
    environment:
      PORT: 3000
      BACKEND_URL: http://localhost
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node server.js --check"]
      interval: 10s
      timeout: 5s
      retries: 3